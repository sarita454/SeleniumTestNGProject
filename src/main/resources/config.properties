# Configuration used by tests and page objects
# Set base URL for the AUT (application under test)

# Base application URL
#base.url=https://mail.google.com/
#base.url=https://www.google.com/
base.url=https://rahulshettyacademy.com/AutomationPractice/

# Default browser to run tests against. Can be overridden with -Dbrowser=chrome|firefox
browser=chrome

# Run browser in headless mode by default. Can be overridden with -Dheadless=true
headless=false

# ChromeDriver path (relative to project root)
chromedriver.path=Driver/chromedriver.exe

# Timeouts (seconds)
implicit.wait=5
page.load.timeout=60
